name: "JULES Autonomous Evolution Loop"
on:
  schedule:
    - cron: '0 2 * * *' # 每天凌晨 2 點運行
permissions: read-all # 預設唯讀安全限制
jobs:
  nightly_experiment:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger JULES Agent
        uses: google-labs-code/jules-action@v1.0.0
        with:
          prompt: "Read program.md and results.tsv. Plan the next architectural modification for train.py. Budget: 5 mins."
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          require_plan_approval: false # 關閉 Planning Critic 以使用快速迭代 (Rapid Iteration) 模式
          safe-outputs: create-pr # 限制 JULES 只能發送 PR，無法直接 merge
